# deny.toml
# Configuration for cargo-deny (https://github.com/EmbarkStudios/cargo-deny)

[graph]
targets = []

[advisories]
db-path = "~/.cargo-deny-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
vulnerability = "deny"
unmaintained = "warn"
unsound = "warn"
yanked = "warn"
notice = "warn"

[licenses]
unlicensed = "deny"
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "OpenSSL",
    "CC0-1.0",
    "Unicode-DFS-2016"
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
deny = []
skip = []
skip-tree = []
