# ═══════════════════════════════════════════════════
# KSP Project Configuration
# Generated by `ksp init`
# Docs: https://www.kspprotocol.dev/docs/config
# ═══════════════════════════════════════════════════

[project]
name = "my-ksp-project"
version = "1.0"
description = "A KSP protocol application"

[server]
host = "0.0.0.0"
port = 9876
max_connections = 256

[security]
cipher = "aes-256-gcm"          # aes-256-gcm | chacha20-poly1305
compression = true         # zstd payload compression
replay_window = 1024       # sliding window size (packets)
cert_file = "certs/server.cert"
key_file = "certs/server.key"

[logging]
level = "info"            # trace | debug | info | warn | error
format = "pretty"          # pretty | json
